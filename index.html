<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: #2c2c3c;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 60px;
      padding: 10px;
      margin: 5px;
      text-align: center;
      font-size: 16px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin: 10px 5px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .start { background: #4CAF50; color: white; }
    .pause { background: #ff9800; color: white; }
    .reset { background: #f44336; color: white; }

    .timer {
      font-size: 40px;
      margin: 20px 0;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Countdown Timer</h1>

  <div>
    <input type="number" id="hours" placeholder="HH" min="0">
    <input type="number" id="minutes" placeholder="MM" min="0">
    <input type="number" id="seconds" placeholder="SS" min="0">
  </div>

  <div class="timer" id="display">00:00:00</div>

  <button class="start" onclick="startTimer()">Start</button>
  <button class="pause" onclick="pauseTimer()">Pause</button>
  <button class="reset" onclick="resetTimer()">Reset</button>
</div>

<script>
  let totalSeconds = 0;
  let interval = null;

  function updateDisplay() {
    let hrs = Math.floor(totalSeconds / 3600);
    let mins = Math.floor((totalSeconds % 3600) / 60);
    let secs = totalSeconds % 60;

    document.getElementById("display").innerText =
      String(hrs).padStart(2, '0') + ":" +
      String(mins).padStart(2, '0') + ":" +
      String(secs).padStart(2, '0');
  }

  function startTimer() {
    if (interval) return;

    if (totalSeconds === 0) {
      let h = parseInt(document.getElementById("hours").value) || 0;
      let m = parseInt(document.getElementById("minutes").value) || 0;
      let s = parseInt(document.getElementById("seconds").value) || 0;

      totalSeconds = h * 3600 + m * 60 + s;
    }

    interval = setInterval(() => {
      if (totalSeconds > 0) {
        totalSeconds--;
        updateDisplay();
      } else {
        clearInterval(interval);
        interval = null;
        alert("Time's up!");
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    interval = null;
  }

  function resetTimer() {
    clearInterval(interval);
    interval = null;
    totalSeconds = 0;
    updateDisplay();

    document.getElementById("hours").value = "";
    document.getElementById("minutes").value = "";
    document.getElementById("seconds").value = "";
  }

  updateDisplay();
</script>

</body>
</html>
